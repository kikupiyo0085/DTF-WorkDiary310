<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DTF Work Diary 310</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
</head>

<body>

<div class="container">

    <!-- ==========================
         Header
    =========================== -->

    <header class="top-bar">

        <button id="prevMonth" class="month-button">◀</button>

        <h1 id="currentMonth">
            2026年6月
        </h1>

        <button id="nextMonth" class="month-button">▶</button>

        <button id="newDiary" class="new-button">
            ＋ 新規作成
        </button>

    </header>

    <!-- ==========================
         Calendar
    =========================== -->

    <section class="calendar-area">

        <div class="week-header">
            <div>日</div>
            <div>月</div>
            <div>火</div>
            <div>水</div>
            <div>木</div>
            <div>金</div>
            <div>土</div>
        </div>

        <div id="calendar" class="calendar-grid">
            <!-- JavaScriptで生成 -->
        </div>

    </section>

    <!-- ==========================
         Today
    =========================== -->

    <section class="today-card">

        <h2>今日の日誌</h2>

        <div id="todayDate">
            2026/06/29（月）
        </div>

        <div class="today-buttons">

            <button id="continueButton">
                編集を続ける
            </button>

        </div>

    </section>

</div>

<!-- JavaScript -->

<script src="js/storage.js"></script>
<script src="js/calendar.js"></script>
<script src="js/app.js"></script>

</body>
</html>
