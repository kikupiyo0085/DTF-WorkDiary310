<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DTF Work Diary 310</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/calendar.css">
</head>

<body>

<div class="container">

    <!-- ==========================
         Header
    =========================== -->

    <header class="top-bar">

        <button id="prevMonth" class="month-button">◀</button>

        <h1 id="currentMonth">2026年6月</h1>

        <button id="nextMonth" class="month-button">▶</button>

        <button id="newDiary" class="new-button">
            ＋ 新規作成
        </button>

    </header>


    <!-- ==========================
         ホームダッシュボード
    =========================== -->

    <section class="home-grid">

        <!-- 前日パネル -->
        <div id="yesterdayPanel" class="panel">

            <h3>前日</h3>
            <p>読み込み中...</p>

        </div>

        <!-- 今日パネル -->
        <div id="todayPanel" class="panel">

            <h3>今日</h3>

            <div id="todayDate"></div>

            <button id="continueButton" class="primary-button">
                今日を編集
            </button>

        </div>

    </section>


    <!-- ==========================
         カレンダー
    =========================== -->

    <section class="calendar-area">

        <div class="week-header">
            <div>日</div>
            <div>月</div>
            <div>火</div>
            <div>水</div>
            <div>木</div>
            <div>金</div>
            <div>土</div>
        </div>

        <div id="calendar" class="calendar-grid"></div>

    </section>

</div>


<!-- ==========================
     JS
=========================== -->

<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/home.js"></script>
<script src="js/calendar.js"></script>

</body>
</html>
